<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Application</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app-body" data-page="edit-application">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">TrackForge</div>
      <nav class="side-nav">
        <a href="/">Dashboard</a>
        <a href="/my-applications" class="active">My Applications</a>
        <a href="/applications/new">Add Application</a>
        <a href="/analytics">Analytics</a>
        <a href="/calendar">Calendar</a>
        <a href="/settings">Settings</a>
      </nav>
      <div class="sidebar-user">
        <p>Signed in as</p>
        <strong id="sidebar-user-name">Guest</strong>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <div>
          <h1>Edit Application</h1>
          <p>Manage applications with clear status tracking.</p>
        </div>
        <div class="topbar-actions">
          <a class="btn-primary" href="/applications/new">+ New</a>
          <form method="POST" action="/logout">
            <button type="submit" class="btn-secondary">Logout</button>
          </form>
        </div>
      </header>

      <main class="container">
        <div id="flash-message"></div>

        <section class="card form-card">
          <h2>Edit Application</h2>
          <form method="POST" action="/applications" class="form-grid" id="edit-application-form">
            <label>
              Company
              <input type="text" name="company" id="edit-company" required />
            </label>

            <label>
              Position
              <input type="text" name="position" id="edit-position" required />
            </label>

            <label>
              Location
              <input type="text" name="location" id="edit-location" />
            </label>

            <label>
              Date Applied
              <input type="date" name="dateApplied" id="edit-date-applied" required />
            </label>

            <label>
              Status
              <select name="status" id="edit-status">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
              </select>
            </label>

            <label>
              Job URL
              <input type="url" name="jobUrl" id="edit-job-url" />
            </label>

            <label class="full-width">
              Notes
              <textarea name="notes" id="edit-notes" rows="4"></textarea>
            </label>

            <div class="full-width actions-row">
              <button class="btn-primary" type="submit">Update Application</button>
              <a class="btn-secondary" href="/my-applications">Cancel</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
