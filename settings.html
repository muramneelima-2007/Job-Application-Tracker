<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app-body" data-page="settings">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">TrackForge</div>
      <nav class="side-nav">
        <a href="/">Dashboard</a>
        <a href="/my-applications">My Applications</a>
        <a href="/applications/new">Add Application</a>
        <a href="/analytics">Analytics</a>
        <a href="/calendar">Calendar</a>
        <a href="/settings" class="active">Settings</a>
      </nav>
      <div class="sidebar-user">
        <p>Signed in as</p>
        <strong id="sidebar-user-name">Guest</strong>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <div>
          <h1>Settings</h1>
          <p>Manage applications with clear status tracking.</p>
        </div>
        <div class="topbar-actions">
          <a class="btn-primary" href="/applications/new">+ New</a>
          <form method="POST" action="/logout">
            <button type="submit" class="btn-secondary">Logout</button>
          </form>
        </div>
      </header>

      <main class="container">
        <div id="flash-message"></div>

        <section class="card form-card">
          <h2>Profile Settings</h2>
          <form method="POST" action="/settings" class="form-grid" id="settings-form">
            <label>
              Full Name
              <input type="text" name="name" id="settings-name" required />
            </label>

            <label>
              Email
              <input type="email" name="email" id="settings-email" required />
            </label>

            <div class="full-width actions-row">
              <button class="btn-primary" type="submit">Save Changes</button>
              <a class="btn-secondary" href="/">Cancel</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
